# === MySQL Database Connection ===
# Set these environment variables before running:
#   MYSQL_DB       - database name
#   MYSQL_USER     - your MySQL username
#   MYSQL_PASSWORD - your MySQL password

spring.datasource.url=jdbc:mysql://localhost:3306/${MYSQL_DB}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.sql.init.mode=${SQL_INIT_MODE:never}

# === Server ===
server.port=8080

# === JWT Authentication ===
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:2592000000}

# === Login Email Alerts ===
# For Gmail, create an App Password and set MAIL_USERNAME/MAIL_PASSWORD before running the backend.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.login-alert.to=${LOGIN_ALERT_TO:}
app.login-alert.enabled=${LOGIN_ALERT_ENABLED:false}

# === Swagger ===
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
