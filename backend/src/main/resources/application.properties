# === MySQL Database Connection ===
# Set these environment variables OR replace with your own values:
#   MYSQL_USER  - your MySQL username
#   MYSQL_PASSWORD - your MySQL password
#   MYSQL_DB    - database name (default: networkingroadmap_db)
# If env vars are not set, falls back to defaults below.

spring.datasource.url=jdbc:mysql://localhost:3306/${MYSQL_DB:networkingroadmap_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:nrking}
spring.datasource.password=${MYSQL_PASSWORD:rootsai}

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# === Server ===
server.port=8080

# === JWT Authentication ===
jwt.secret=ReplaceThisSecretWithAStrongRandomValue
jwt.expiration-ms=86400000

# === Login Email Alerts ===
# For Gmail, create an App Password and set MAIL_USERNAME/MAIL_PASSWORD before running the backend.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.login-alert.to=${LOGIN_ALERT_TO:dandwateakshay45@gmail.com}
app.login-alert.enabled=${LOGIN_ALERT_ENABLED:true}

# === Swagger ===
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
